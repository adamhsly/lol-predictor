name: Build Electron

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            build-flag: --win
            sidecar-name: shap_predict.exe
          - os: macos-latest
            build-flag: --mac
            sidecar-name: shap_predict
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: electron-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Build SHAP sidecar
        run: |
          pip install pyinstaller xgboost shap numpy pandas
          pyinstaller --onefile --distpath sidecar/dist --name shap_predict sidecar/shap_predict.py
        shell: bash

      - name: Build Electron app
        run: npx electron-vite build && npx electron-builder ${{ matrix.build-flag }} --publish never

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --generate-notes
          shopt -s nullglob
          for f in dist-electron/*.exe dist-electron/*.dmg; do
            gh release upload "$tag" "$f" --clobber
          done
        shell: bash
