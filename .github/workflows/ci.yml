name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'lol_genius/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'db/migrations/**'
              - 'config.yaml'
            frontend:
              - 'frontend/**'

  lint:
    needs: changes
    if: >-
      always() &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.python == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3

  test:
    needs: changes
    if: >-
      always() &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.python == 'true')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: lol_genius
          POSTGRES_USER: lol_genius
          POSTGRES_PASSWORD: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lol_genius"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://lol_genius:ci_test@localhost:5432/lol_genius
      TEST_DATABASE_URL: postgresql://lol_genius:ci_test@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dbmate
        run: |
          curl -fsSL -o /usr/local/bin/dbmate https://github.com/amacneil/dbmate/releases/download/v2.24.2/dbmate-linux-amd64
          chmod +x /usr/local/bin/dbmate
      - run: pip install -e ".[test]"
      - run: pytest tests/

  frontend:
    needs: changes
    if: >-
      always() &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
